<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="theme-color" content="#fbfaf8" />
    <title>Tulistica · donde vive la lista del super</title>
    <meta name="description" content="Tulistica · la lista del super de tu casa, comparada en 187 tiendas de Costa Rica. Hacé tu lista, te decimos dónde pagar menos." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Montserrat:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Umami analytics: only inject in production when env vars are configured. -->
    <script type="module">
      const endpoint = "%VITE_ANALYTICS_ENDPOINT%";
      const websiteId = "%VITE_ANALYTICS_WEBSITE_ID%";
      if (
        endpoint &&
        !endpoint.startsWith("%") &&
        websiteId &&
        !websiteId.startsWith("%")
      ) {
        const s = document.createElement("script");
        s.defer = true;
        s.src = endpoint + "/umami";
        s.dataset.websiteId = websiteId;
        document.body.appendChild(s);
      }
    </script>
  </body>
</html>
